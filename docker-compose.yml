services:
  traefik:
    image: traefik:v3.6
    command:
      - --api=true
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    labels:
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=Host(`traefik.hosaka.io`)
      - traefik.http.routers.dashboard.entrypoints=websecure
      - traefik.http.routers.dashboard.tls.certresolver=letsencrypt
      - traefik.http.routers.dashboard.tls.domains[0].main=hosaka.io
      - traefik.http.routers.dashboard.tls.domains[0].sans=*.hosaka.io
      - traefik.http.routers.dashboard.service=api@internal
      - traefik.http.routers.dashboard.middlewares=dashboard-auth
      - traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}
      - traefik.http.middlewares.block-health.ipallowlist.sourcerange=127.0.0.1/32
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CLOUDFLARE_EMAIL=${ACME_EMAIL}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    restart: unless-stopped

  db:
    image: postgres:18
    volumes:
      - /var/lib/postgresql:/var/lib/postgresql
      - ./moods-dev/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MOODS_DB_PASSWORD=${MOODS_DB_PASSWORD}
      - MOODS_DEV_DB_PASSWORD=${MOODS_DEV_DB_PASSWORD}
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin:/var/lib/pgadmin
    labels:
      - traefik.enable=true
      - traefik.http.routers.pgadmin.rule=Host(`pg.hosaka.io`)
      - traefik.http.routers.pgadmin.entrypoints=websecure
      - traefik.http.routers.pgadmin.tls.certresolver=letsencrypt
      - traefik.http.routers.pgadmin.tls.domains[0].main=hosaka.io
      - traefik.http.routers.pgadmin.tls.domains[0].sans=*.hosaka.io
    depends_on:
      - db
    restart: unless-stopped

  moods-prod:
    image: ghcr.io/brianedwards85/moods:latest
    environment:
      - MOODS_ENV=production
      - MOODS_DB__HOST=db
      - MOODS_DB__PORT=5432
      - MOODS_DB__NAME=moods
      - MOODS_DB__USER=moods
      - MOODS_DB__PASSWORD=${MOODS_DB_PASSWORD}
    volumes:
      - ./settings.toml:/app/settings.toml:ro
      - ./secrets.prod.toml:/app/.secrets.toml:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.moods-prod.rule=Host(`moods.hosaka.io`)
      - traefik.http.routers.moods-prod.entrypoints=websecure
      - traefik.http.routers.moods-prod.tls.certresolver=letsencrypt
      - traefik.http.routers.moods-prod.tls.domains[0].main=hosaka.io
      - traefik.http.routers.moods-prod.tls.domains[0].sans=*.hosaka.io
      - traefik.http.routers.moods-prod-health.rule=Host(`moods.hosaka.io`) && Path(`/health`)
      - traefik.http.routers.moods-prod-health.entrypoints=websecure
      - traefik.http.routers.moods-prod-health.tls.certresolver=letsencrypt
      - traefik.http.routers.moods-prod-health.middlewares=block-health
      - traefik.http.routers.moods-prod-health.priority=200
    depends_on:
      - db
    restart: unless-stopped

  moods-dev:
    build: moods
    environment:
      - MOODS_ENV=development
      - MOODS_DB__HOST=db
      - MOODS_DB__PORT=5432
      - MOODS_DB__NAME=moods_dev
      - MOODS_DB__USER=moods_dev
      - MOODS_DB__PASSWORD=${MOODS_DEV_DB_PASSWORD}
    volumes:
      - ./settings.toml:/app/settings.toml:ro
      - ./secrets.dev.toml:/app/.secrets.toml:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.moods-dev.rule=Host(`moods-dev.hosaka.io`)
      - traefik.http.routers.moods-dev.entrypoints=websecure
      - traefik.http.routers.moods-dev.tls.certresolver=letsencrypt
      - traefik.http.routers.moods-dev.tls.domains[0].main=hosaka.io
      - traefik.http.routers.moods-dev.tls.domains[0].sans=*.hosaka.io
      - traefik.http.routers.moods-dev-health.rule=Host(`moods-dev.hosaka.io`) && Path(`/health`)
      - traefik.http.routers.moods-dev-health.entrypoints=websecure
      - traefik.http.routers.moods-dev-health.tls.certresolver=letsencrypt
      - traefik.http.routers.moods-dev-health.middlewares=block-health
      - traefik.http.routers.moods-dev-health.priority=200
    depends_on:
      - db
    restart: unless-stopped

volumes:
  letsencrypt:
  pgadmin:
