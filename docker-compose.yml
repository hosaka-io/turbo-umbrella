services:
  traefik:
    image: traefik:v3.6
    command:
      - --configFile=/etc/traefik/traefik.yml
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --tracing.otlp.http.headers.Authorization=Basic ${OTEL_AUTH_TOKEN}
    ports:
      - "80:80"
      - "443:444"
    volumes:
      - ./traefik:/etc/traefik:ro
      - letsencrypt:/letsencrypt
    environment:
      - CLOUDFLARE_EMAIL=${ACME_EMAIL}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      - TRAEFIK_DASHBOARD_AUTH=${TRAEFIK_DASHBOARD_AUTH}
    networks:
      default:
      vpn:
        ipv4_address: 10.9.0.2
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  db:
    image: postgres:18
    volumes:
      - /var/lib/postgresql:/var/lib/postgresql
      - ./moods-dev/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MOODS_DB_PASSWORD=${MOODS_DB_PASSWORD}
      - MOODS_DEV_DB_PASSWORD=${MOODS_DEV_DB_PASSWORD}
      - KEYCLOAK_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin:/var/lib/pgadmin
      - ./pgadmin/config_local.py:/pgadmin4/config_local.py:ro
    depends_on:
      - db
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  moods-prod:
    image: ghcr.io/brianedwards85/moods:latest
    environment:
      - MOODS_ENV=production
      - MOODS_DB__HOST=db
      - MOODS_DB__PORT=5432
      - MOODS_DB__NAME=moods
      - MOODS_DB__USER=moods
      - MOODS_DB__PASSWORD=${MOODS_DB_PASSWORD}
    volumes:
      - ./settings.toml:/app/settings.toml:ro
      - ./secrets.prod.toml:/app/.secrets.toml:ro
    depends_on:
      - db
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  moods-dev:
    build: moods_dev
    environment:
      - MOODS_ENV=development
      - MOODS_DB__HOST=db
      - MOODS_DB__PORT=5432
      - MOODS_DB__NAME=moods_dev
      - MOODS_DB__USER=moods_dev
      - MOODS_DB__PASSWORD=${MOODS_DEV_DB_PASSWORD}
    volumes:
      - ./settings.toml:/app/settings.toml:ro
      - ./secrets.dev.toml:/app/.secrets.toml:ro
    depends_on:
      - db
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    environment:
      - ZO_ROOT_USER_EMAIL=${ZO_ROOT_USER_EMAIL}
      - ZO_ROOT_USER_PASSWORD=${ZO_ROOT_USER_PASSWORD}
      - ZO_DATA_DIR=/data
      - ZO_MEM_TABLE_MAX_SIZE=512
      - ZO_COMPACT_DATA_RETENTION_DAYS=180
      - ZO_CREATE_ORG_THROUGH_INGESTION=true
      - ZO_COOKIE_SECURE_ONLY=true
      - ZO_TELEMETRY=false
    volumes:
      - /var/lib/openobserve:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  fluent-bit:
    image: fluent/fluent-bit:latest
    volumes:
      - ./fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    environment:
      - ZO_ROOT_USER_EMAIL=${ZO_ROOT_USER_EMAIL}
      - ZO_ROOT_USER_PASSWORD=${ZO_ROOT_USER_PASSWORD}
    depends_on:
      - openobserve
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    environment:
      - WG_DEFAULT_DNS=10.9.0.3
      - WG_ALLOWED_IPS=10.9.0.0/24
      - WG_PERSISTENT_KEEPALIVE=25
      - PORT=51821
      - LANG=en
    volumes:
      - etc_wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
    networks:
      default:
      vpn:
        ipv4_address: 10.9.0.4
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  dnsmasq:
    image: 4km3/dnsmasq:latest
    volumes:
      - ./dnsmasq.conf:/etc/dnsmasq.conf:ro
    networks:
      vpn:
        ipv4_address: 10.9.0.3
    cap_add:
      - NET_ADMIN
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26
    command: start
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KC_HOSTNAME=auth.hosaka.io
      - KC_HOSTNAME_ADMIN=auth.dev.hosaka.io
      - KC_HTTP_ENABLED=true
      - KC_HTTP_PORT=8080
      - KC_PROXY_HEADERS=xforwarded
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      - KC_TRACING_ENABLED=true
      - KC_TRACING_ENDPOINT=http://openobserve:5080/api/3ANT9xNeShmoldeVfO1ZlOblRjw/v1/traces
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    depends_on:
      - db
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    command: --config=/etc/oauth2-proxy/oauth2-proxy.cfg
    environment:
      - OAUTH2_PROXY_CLIENT_SECRET=${OAUTH2_PROXY_CLIENT_SECRET}
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET}
    volumes:
      - ./oauth2-proxy.cfg:/etc/oauth2-proxy/oauth2-proxy.cfg:ro
    depends_on:
      - keycloak
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    environment:
      - ZO_ROOT_USER_EMAIL=${ZO_ROOT_USER_EMAIL}
      - ZO_ROOT_USER_PASSWORD=${ZO_ROOT_USER_PASSWORD}
    depends_on:
      - keycloak
      - openobserve
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  letsencrypt:
  pgadmin:
  etc_wireguard:

networks:
  vpn:
    driver: bridge
    ipam:
      config:
        - subnet: 10.9.0.0/24
