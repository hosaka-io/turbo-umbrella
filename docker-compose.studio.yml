services:
  dolt:
    image: dolthub/dolt-sql-server:latest
    volumes:
      - /Users/bedwards/.doltdb:/var/lib/dolt
    ports:
      - "127.0.0.1:3307:3306"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  studio:
    build:
      context: ./nix-docker
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:9999:9999"
    volumes:
      - /Users/bedwards/.config/home-manager:/home/dev/.config/home-manager
      - /Users/bedwards/claude-sandbox:/home/dev/workspace
      - /Users/bedwards/indeed:/home/dev/indeed
    stdin_open: true
    tty: true
    restart: unless-stopped
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: duefare
      POSTGRES_PASSWORD: duefare
      POSTGRES_DB: duefare
    ports:
      - "5433:5432"
    volumes:
      - /Users/bedwards/.docker_volumes/postgresql:/var/lib/postgresql/

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: bedwards@edwardstx.us
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8433:80"
    depends_on:
      - postgres
