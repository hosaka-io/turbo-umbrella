provider = "keycloak-oidc"
oidc_issuer_url = "https://auth.hosaka.io/realms/hosaka"
client_id = "oauth2-proxy"
redirect_url = "https://auth.hosaka.io/oauth2/callback"

upstream = "static://202"

http_address = "0.0.0.0:4180"

cookie_domains = [".hosaka.io"]
cookie_secure = true
cookie_samesite = "lax"

email_domains = ["*"]
skip_provider_button = true

set_xauthrequest = true
pass_access_token = true
